<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/> <!-- sky-400 -->
      <stop offset="100%" stop-color="#3b82f6"/> <!-- blue-500 -->
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/> <!-- purple-400 -->
      <stop offset="100%" stop-color="#9333ea"/> <!-- purple-600 -->
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/> <!-- pink-400 -->
      <stop offset="100%" stop-color="#e11d48"/> <!-- rose-600 -->
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/> <!-- amber-400 -->
      <stop offset="100%" stop-color="#ea580c"/> <!-- orange-600 -->
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <g transform="translate(64, 64)" filter="url(#shadow)">
    <!-- Top Left -->
    <rect x="0" y="0" width="112" height="112" rx="32" fill="url(#grad1)"/>
    <!-- Top Middle + Right (merged into wide block) -->
    <rect x="136" y="0" width="248" height="112" rx="32" fill="url(#grad2)"/>
    
    <!-- Middle Left + Center (merged into tall block) -->
    <rect x="0" y="136" width="248" height="248" rx="64" fill="url(#grad3)"/>
    <!-- Middle Right -->
    <rect x="272" y="136" width="112" height="112" rx="32" fill="url(#grad4)"/>
    
    <!-- Bottom Right -->
    <rect x="272" y="272" width="112" height="112" rx="32" fill="url(#grad1)"/>
  </g>
</svg>
